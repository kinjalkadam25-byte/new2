<!DOCTYPE html>
<html>
<head><title>Login Test</title></head>
<body>
<input id="u" placeholder="username" /><br><br>
<input id="p" type="password" placeholder="password" /><br><br>
<button onclick="login()">Sign In</button>
<p id="msg"></p>
<script>
function login() {
  var u = document.getElementById('u').value.trim();
  var p = document.getElementById('p').value;
  if (u === 'Jitendra' && p === 'finance@2025') {
    document.getElementById('msg').innerText = 'SUCCESS - Login works!';
    document.getElementById('msg').style.color = 'green';
  } else {
    document.getElementById('msg').innerText = 'Wrong credentials. Try: Jitendra / finance@2025';
    document.getElementById('msg').style.color = 'red';
  }
}
</script>
</body>
</html>
